name: Fetch Daily AI News

on:
  schedule:
    # Runs every day at 7:00 AM UTC (midnight Pacific)
    - cron: "0 7 * * *"
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit results back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser pyyaml requests

      - name: Fetch latest AI news
        run: python fetch_news.py

      - name: Commit new posts (if any)
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ seen_urls.json
          git diff --staged --quiet || git commit -m "📰 Daily AI news update $(date +%Y-%m-%d)"
          git push
